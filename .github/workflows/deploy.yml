name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Git ref to build and deploy.
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: build-and-publish
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each font variant is published to its own gh-pages branch.
        font:
          - { key: all, suffix: '' }
          - { key: cdn, suffix: '-cdn-fonts' }
          - { key: firasans, suffix: '-firasans-only' }
          - { key: misans, suffix: '-misans-only' }
          - { key: pingfang, suffix: '-pingfang-only' }
          - { key: sarasa, suffix: '-sarasa-only' }
          - { key: none, suffix: '-no-fonts' }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}
      - uses: actions/setup-node@v6
      - uses: pnpm/action-setup@v6

      - name: Install and Build 🔧
        env:
          FONT: ${{ matrix.font.key }}
        run: |
          pnpm i
          pnpm run build
          test -f ./dist/icons/AI.png
          test -f ./dist/icons/United_States.png
          echo 'board.zash.run.place' > ./dist/CNAME

      - name: Deploy 🚀
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: ./dist
          publish_branch: gh-pages${{ matrix.font.suffix }}
          force_orphan: true

      - name: Archive build
        run: zip -r zashboard${{ matrix.font.suffix }}.zip dist

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: zashboard${{ matrix.font.suffix }}
          path: zashboard${{ matrix.font.suffix }}.zip
          if-no-files-found: error
          retention-days: 1

  publish-release:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          pattern: zashboard*
          path: release
          merge-multiple: true

      - name: Prepare release metadata
        id: metadata
        run: |
          release_date="$(TZ=Asia/Shanghai date '+%Y-%m-%d')"
          release_time="$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M %Z')"
          source_version="$(node -p \"require('./package.json').version\")"
          echo "tag=$release_date" >> "$GITHUB_OUTPUT"
          echo "version=$source_version" >> "$GITHUB_OUTPUT"
          echo "title=Zashboard v$source_version 自动构建 - $release_date" >> "$GITHUB_OUTPUT"
          cat > RELEASE_NOTES.md <<EOF
          ## 自动构建更新

          - 更新日期（中国标准时间）：$release_time
          - 日期 Tag：\`$release_date\`
          - 源码版本：\`v$source_version\`
          - 源码提交：[\`${GITHUB_SHA::7}\`](https://github.com/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)
          - 提交说明：$(git log -1 --pretty=%s)
          - 产物包含 \`icons\` 自定义图标目录。

          本 Release 始终只保留最新构建，ZIP 文件会在后续成功构建时直接覆盖。
          EOF

      - name: Update latest release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
          RELEASE_TITLE: ${{ steps.metadata.outputs.title }}
        run: |
          existing_tag="$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')"

          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

          if [ -z "$existing_tag" ]; then
            gh release create "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file RELEASE_NOTES.md --latest
          else
            if [ "$existing_tag" != "$RELEASE_TAG" ]; then
              gh release edit "$existing_tag" --tag "$RELEASE_TAG"
              git push origin ":refs/tags/$existing_tag" || true
            fi
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes-file RELEASE_NOTES.md --latest
          fi

          gh release upload "$RELEASE_TAG" release/*.zip --clobber
