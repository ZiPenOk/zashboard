name: Sync Upstream

on:
  schedule:
    # 00:10 China Standard Time (UTC+8).
    - cron: '10 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.merge.outputs.changed }}
    steps:
      - name: Check out fork
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Zephyruso/zashboard.git
          git fetch upstream main

      - name: Merge new upstream commits
        id: merge
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            echo 'Fork is already up to date.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          if ! git merge --no-ff --no-edit upstream/main; then
            git merge --abort
            echo '::error title=Upstream merge conflict::Resolve the conflict on main, then re-run this workflow.'
            exit 1
          fi

          echo 'changed=true' >> "$GITHUB_OUTPUT"

      - name: Push merged updates
        if: steps.merge.outputs.changed == 'true'
        run: git push origin HEAD:main

  deploy:
    needs: sync
    if: needs.sync.outputs.changed == 'true'
    uses: ./.github/workflows/deploy.yml
    with:
      ref: main
